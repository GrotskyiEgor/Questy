{% extends "base.html" %}

{% block title %}
    Room
{% endblock %}

{% block links %}
    <link rel="stylesheet" href="{{ url_for('test_app.static', filename= 'css/room.css') }}">
    <link rel="stylesheet" href="{{ url_for('test_app.static', filename= 'css/room_test_result.css') }}">
{% endblock %}
    
{% block content %}

    <div class="room-content" id="room-content"></div>

    <input type="hidden" name="csrf_token" id="csrf_token" value="{{ csrf_token() }}">
    <audio class="music-theme" id="onlineQuestionTheme" src="{{ url_for('test_app.static', filename= 'music/questionTheme.mp3') }}" loop></audio>
    <audio class="music-theme" id="onlineRoomTheme" src="{{ url_for('test_app.static', filename= 'music/roomTheme2.mp3') }}" loop></audio>
    <audio class="music-sound" id="correctResult" src="{{ url_for('test_app.static', filename= 'music/correct.mp3') }}"></audio>
    <audio class="music-sound" id="wrongResult" src="{{ url_for('test_app.static', filename= 'music/wrong.mp3') }}" ></audio>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="{{ url_for('test_app.static', filename= 'js/constant.js') }}"></script>

    <script src="{{ url_for('test_app.static', filename= 'js/roomFiles/addUserBlock.js') }}"></script>
    <script src="{{ url_for('test_app.static', filename= 'js/roomFiles/chartManager.js') }}"></script>
    <script src="{{ url_for('test_app.static', filename= 'js/roomFiles/timerManager.js') }}"></script>

    <script src="{{ url_for('test_app.static', filename= 'js/roomFiles/testStates.js') }}"></script>

    <script src="{{ url_for('test_app.static', filename= 'js/roomRenderPages/renderWaitPage.js') }}"></script>
    <script src="{{ url_for('test_app.static', filename= 'js/roomRenderPages/renderAuthorStart.js') }}"></script>
    <script src="{{ url_for('test_app.static', filename= 'js/roomRenderPages/renderQuestion.js') }}"></script>
    <script src="{{ url_for('test_app.static', filename= 'js/roomRenderPages/renderResultTest.js') }}"></script>
    <script src="{{ url_for('test_app.static', filename= 'js/roomRenderPages/renderAuthorResultTest.js') }}"></script>
    
    <script>  
        let username = "{{ username }}"; 
        const room = "{{ test.test_code }}"; 
        const testId = Number("{{ test.id }}");
        const reconnect = getCookie("reconnect")
        const authorName = "{{ test.author_name }}";
        const totalQuestion = Number("{{ test.total_questions }}");
        const testShowResult = "{{ test_show_result }}" === "True"; 

        const SOUND_ON = "{{ url_for('test_app.static', filename='images/online_test/sound_on.png') }}";
        const SOUND_OFF = "{{ url_for('test_app.static', filename='images/online_test/sound_off.png') }}";
        let answeredOrder = [];

        const quizList = {{ list_quiz | tojson }};
        const anwersList = {{ list_answers | tojson }};
        const theme = document.getElementById("onlineRoomTheme");

        theme.play().then(() => {
            theme.muted = false;
        }).catch(error => {
            console.log(error)
        })
        
        if (!username) {
            username= getCookie("temporaryName");
            if (!username) {
                window.location.href = `/temporary_name${room}`;
            };
        };

        let testMusic = getCookie("music") === "true";

        if (getCookie("music") === null){
            testMusic = true
            setCookie("music", "true")
        }
        
        const socket = io("/", 
            {
                reconnection: true,
                reconnectionAttempts: 7,
                reconnectionDelay: 1000
            }
        );

        let state = getCookie("state");
        let connected = getCookie("connected")
        let timerPaused = getCookie("timeStop");
        let plusAnswerTime = 0;
        let timerInterval = null;
        let extraTimeSeconds = 15
        let newMessageCount = 0;

        if (timerPaused === NaN){
            setCookie("timeStop", "false")
            timerPaused= false
        }else if (timerPaused == 'true'){
            timerPaused= true
        }else if (timerPaused == 'false'){
            timerPaused= false
        } 

        let stateIndex = 0

        if (state) {
            stateIndex = Number(state.replace(/\D/g, ""))
            console.log("Take stateIndex", stateIndex)
        }

        if (state && state.includes("authorStart")) {
            state = getCookie("state");
            let time = Number(getCookie("time"));
            renderAuthorStart(quizList[stateIndex], room, authorName, stateIndex, quizList.length, stateIndex);
        } 
        else if (state === "authorResultTest") {
            renderAuthorResultTest(username, authorName, quizList.length);
        } 
        else if (state === "resultTest") {
            renderResultTest(username, quizList.length, quizList, anwersList, testId);
        } else if (reconnect){
            clearCookie(["reconnect"])

            socket.emit("reconnect_user", {
                room: room,
                username: username,
                author_name: authorName
            });

            console.log("reconnect")
            checkAnswers("reconnect")
            renderWaitQuestion("reconnect")
        }
        else if (state && state.includes("question")) {
            let time = Number(getCookie("time"))
            renderQuestion(Number("{{ test.id }}"), quizList[stateIndex], anwersList[stateIndex], room, authorName, testShowResult, stateIndex);
        } 
        else if (state && state.includes("wait")) {
            renderWaitQuestion("test");
        }
        else {
            if (authorName === username || connected === "1"){
                let userList= getCookie("userList")
                renderRoomMain(room, authorName, username, quizList, userList, testShowResult);
                setCookie("room", room)
    
                let messages= document.getElementById("messages");
                
                if (messages && messages.children.length != 1){
                    const emptyMessages= document.getElementById("no-messages");
                    if (emptyMessages){
                        emptyMessages.remove()
                    }
                }
            } else{
                renderWaitQuestion("start");
            }
        }

        socket.on("connect", function () {   
            let taskId
            if (username === authorName){
                const params = new URLSearchParams(window.location.search);

                const rawTaskId = params.get("task_id")
                taskId = Number(rawTaskId)
            }  
            
            socket.emit("join", {
                room: room,
                username: username,
                device_id: getDeviceId(),
                task_id: !isNaN(taskId) ? taskId : null
            });
            
            if (username !== authorName && !state) {                            
                fetch('https://api.ipify.org?format=text')
                    .then(r => r.text())
                    .then(ip => {
                        socket.emit("new_user_admin", {
                            room: room,
                            username: username,
                            author_name: authorName,
                            connected: connected,
                            ip: ip
                        });
                    })
                    .catch(e => console.error("Ошибка IP:", e));
            }
        });

        socket.on("listening_to_messages", function(data) {
            let messages = document.getElementById("messages");
            
            const activeChat = document.querySelector('.chat.open');
            if (!activeChat){
                newMessageCount++;

                const chat = document.querySelector('.chat-toggle-btn');

                if (chat){
                    messageCountDiv =  chat.querySelector(".new-task-count")
                    if (messageCountDiv) messageCountDiv.remove();
                    chat.innerHTML += `<div class="new-task-count">${newMessageCount}</div>`
                }
            }

            if (messages != "") {
                messages.innerHTML += `<p class="other-msg">${data}</p>`;  
            };

            if (messages && messages.children.length != 1){
                const emptyMessages= document.getElementById("no-messages");
                if (emptyMessages){
                    emptyMessages.remove()
                }
            }
        });

        socket.on('user_disconnected', function(data) {         
            let messages = document.getElementById("messages");

            if (messages && messages.children.length != 1){
                const emptyMessages= document.getElementById("no-messages");
                if (emptyMessages){
                    emptyMessages.remove()
                }
            }

            let removeUserBlock= document.getElementById(`user${data['username']}`)

            if (removeUserBlock) {
                removeUserBlock.remove()
            }
        });

        socket.on('kicked', function(data) {
            clearCookie(["room", "state", "userAnswers", "connected", "countUsersAnswer", "temporaryName", "timeStop", "time"])
            window.location.href = '/?kick=true'; 
        });    
        
        socket.on("author_receive_answer", function(data) {     
            let answer= data["answer"]           
            let countUsersAnswer= getCookie("countUsersAnswer");
            countUsersAnswer = Number(countUsersAnswer) + 1  
            setCookie("countUsersAnswer", countUsersAnswer)

            state = getCookie("state");  
            stateIndex =  Number(state.replace(/\D/g, ""))
            addUserAnswer(data["username"], answer, authorName, quizList[stateIndex]);
            
            socket.emit("get_room_size", {
                room: room,
                author_name: authorName
            });

        });

        socket.on("recieve_count_users", function(data) {  
            let countUsersAnswer= getCookie("countUsersAnswer");
            
            state = getCookie("state");
        });

        socket.on("reconnect_ping", function(data) {          
            state = getCookie("state");        
            let newState = -2
            let newTime = Number(getCookie("time"))     
            
            if (username === authorName){  
                if (state === "authorResultTest"){
                    newState = -1
                    renderResultTest(username, quizList.length, quizList, anwersList, testId);
                } else{
                    newState = stateIndex
                }
            }

            socket.emit("new_state", {
                room: room,
                username: data.username,
                author_name: authorName,
                new_state: newState,
                new_time: newTime
            });
        });

        socket.on("new_state", function(data) {  
            let newState = Number(data["new_state"])

            if (newState === -1){
                console.log("resultTest end", newState)
            } else if (newState === -2){ 
                userLeaveTest()
            }else if (newState >= 0){
                if (Number(data["newTime"]) > 1){
                    setCookie("state", `question${newState}`)
                    renderQuestion(Number("{{ test.id }}"), quizList[Number(newState)], anwersList[Number(newState)], room, authorName, testShowResult, newState);
                } else{
                    setCookie("state", `wait${newState}`)
                    renderWaitQuestion("test");
                }

                console.log("checkAnswers(reconnect)")
                checkAnswers("reconnect")
            } else{
                console.log("BAD REQUEST NEW STATE")
            }

        });

        socket.on("next_question", function(data) {  
            answeredOrder = [];
            let numberOfQuestion = data.number_of_question
            state = getCookie("state");
            setCookie("timeStop", "false")
            timerPaused= false
            
            checkAnswers("test");
            plusAnswerTime = 0

            console.log("NEW STATE QUESTION IDEX", numberOfQuestion)
            if (state != "authorResultTest") {
                setCookie("time", Number(quizList[numberOfQuestion].time))

                console.log(numberOfQuestion != quizList.length, numberOfQuestion, quizList.length)
                if (numberOfQuestion != quizList.length) {
                    setCookie("state", `question${numberOfQuestion}`)
                    renderQuestion(Number("{{ test.id }}"), quizList[numberOfQuestion], anwersList[numberOfQuestion], room, authorName, testShowResult, numberOfQuestion);
                } else if (numberOfQuestion === quizList.length && username === authorName) {
                    socket.emit("stop_test", {
                        room: room,
                        author_name: authorName
                    });
                    
                    setCookie("state", "authorResultTest")
                    renderAuthorResultTest(username, authorName, quizList.length);
                }
            }
        });

        socket.on("result_test", function(data) {      
            checkAnswers("test");
            renderResultTest(username, quizList.length, quizList, anwersList, testId)

            userAnswers= getCookie("userAnswers")
            userTimers= getCookie("userTimers")
            userTokens= getCookie("userTokens")
            task_test_id = getCookie("taskTestId")
            class_id = getCookie("classId")

            socket.emit("user_answers", {
                room: room,
                username: username,
                author_name: authorName,
                user_answers: userAnswers,
                user_timers: userTimers,
                user_tokens: userTokens,
                task_test_id: task_test_id,
                class_id: class_id
            });

            setCookie("state", "resultTest")
        });

        socket.on("create_user_block", function(data) {  
            if (!state){   
                if (username === data["username"]){
                    setCookie("connected", "1");
                    setCookie("room", room);
                    let userList = getCookie("userList")
                    renderRoomMain(room, authorName, username, quizList, userList, testShowResult);

                    let users_list = data["users_list"].slice(1, -1);
                    users_list = users_list.split("||");
                    for (let user of users_list){
                        if (user != username && user != authorName){
                            createUserBlock(username, authorName, user, null, "not");
                        }
                    }
                }  
                createUserBlock(username, authorName, data['username'], data['user_ip'], "not");
            }
        });

        socket.on("new_user_admin", function(data) {  
            let addUser = true
            let userList = getCookie("userList")
            let blockedUsers = getCookie("blockedUsers")
            let waitUserIp = document.querySelectorAll(".user-ip")
            let state = getCookie("state") || false

            if (blockedUsers){
                blockedUsers= blockedUsers.split("$%^")
                
                blockedUsers.forEach(blockIp =>{
                    if (data.ip === blockIp){
                        addUser= false
                    }
                })
            }

            //if (userList){
            //    const exists = userList
            //        .split("</>")
            //        .some(user => user.split("()")[1] === data.ip);
            //
            //    if (exists) addUser = false;
            //}

            //if (userList){
            //    userList= userList.split("</>")
            //    userList= userList.map(user => user.split("()"))
            //
            //    userList.forEach(user =>{
            //        if (user === data.ip){
            //            addUser= false
            //        }
            //    })
            //}
            //
            //if (waitUserIp){
            //    waitUserIp.forEach(userIp =>{
            //        if (userIp.textContent === data.ip){
            //            addUser= false
            //        }
            //    })
            //}

            if (addUser && !state && !data.connected){
                createUserBlock(username, authorName, data['username'], data['ip'], "wait");
            } else {
                createUserBlock(username, authorName, data['username'], data['ip'], "not");
            }
        });

        socket.on('test_end', function(data) {
            leaveTestBlock(room, username)
        });

        socket.on('user_leave', function(data) {          
            const UserCount = document.querySelector(".user-list-count")

            let UserList= getCookie("userList") || ""
            let users= UserList.split("</>").filter(username => username.trim() !== "")

            users= users.filter(userStr => {
                const [name, userIp]= userStr.split("()")
                return name !== data['leave_user']
            })

            const newUserList = users.join("</>")
            setCookie("userList", newUserList)

            if (UserCount){
                UserCount.textContent = Number(UserCount.textContent) - 1
            }
        });

        socket.on('plus_time', function(data) {          
            const timer= document.getElementById("timer")
            if (!timer) return;
            
            const timerCount = Number(getCookie("time"))
            plusAnswerTime += 15
            if (timerCount && timer.textContent != "Час"){
                timer.textContent = parseInt(timerCount) + extraTimeSeconds
                setCookie("time", parseInt(timerCount) + extraTimeSeconds)
            }
        });

        socket.on('change_time', function(data) {          
            timerPaused= !timerPaused;
            setCookie("timeStop", timerPaused);
            const playBtn = document.getElementById("play-btn");
            const playImg = document.getElementById("play-img")

            if (playBtn){
                if (timerPaused){
                    // playBtn.textContent= "Почати";
                    playImg.src = "test_app/static/images/online_test/play.png"
                }
                else{
                    // playBtn.textContent= "Зупинити";
                    playImg.src = "test_app/static/images/online_test/pause.png"
                }
            }
        });

        socket.on('start_test', function(data) {   
            let stateCookies= getCookie("state")
            let state = stateCookies ? Number(stateCookies.replace(/\D/g, "")) : 0;
            let messages = document.getElementById("messages");         
            if (messages){
                messages.innerHTML += `<p>Start ${data["room"]}</p>`;
            }     
            
            setCookie("time", quizList[0].time)
            let connectedStart= getCookie("connected")
            clearCookie(["connected"])

            if (username === data["author_name"]) {        
                setCookie("state", `${COOKIE_AUTHOR_START}0`)  
                setCookie("countUsersAnswer", 0)  
                setCookie("countCorrectAnswer", 0)  
                renderAuthorStart(quizList[0], room, authorName, state, quizList.length, state);
            }
            else if(connectedStart) {
                setCookie("state", "question0")  
                renderQuestion(Number("{{ test.id }}"), quizList[state], anwersList[state], room, authorName, testShowResult, state);
            } else{
                window.location.href = '/'; 
            }
        });
    </script>
{% endblock %}
